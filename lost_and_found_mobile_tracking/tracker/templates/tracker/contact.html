{% extends 'tracker/base.html' %}
{% load static i18n %}
{% block title %}{% trans "Contact Us — LostFound" %}{% endblock %}

{% block content %}
<div class="auth-wrapper animate-slide-up" style="min-height: calc(100vh - 200px); display: flex; align-items: center; justify-content: center;">
    <div class="card auth-card" style="box-shadow: 0 32px 64px -16px rgba(0,0,0,0.3); border-radius: var(--radius-xl); max-width: 500px;">
        <div class="card-header" style="flex-direction: column; align-items: center; text-align: center; padding: 48px 40px 24px; border: none;">
            <div class="logo-icon" style="width: 56px; height: 56px; margin-bottom: 24px; font-size: 1.5rem; background: rgba(99, 102, 241, 0.1); color: var(--brand-primary);">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
            </div>
            <h2 style="font-size: 2rem; margin-bottom: 8px;">{% trans "Get in Touch" %}</h2>
            <p style="font-size: 0.95rem; color: var(--text-secondary);">{% trans "Have questions or feedback? We'd love to hear from you." %}</p>
        </div>
        <div class="card-body" style="padding: 0 40px 48px;">
            <form method="post" action="{% url 'tracker:contact' %}" class="grid" style="gap: 24px;">
                {% csrf_token %}
                <div class="form-group">
                    <label class="form-label">{% trans "Your Name" %}</label>
                    <input type="text" name="name" class="form-control form-control-lg" placeholder="{% trans 'e.g. John Doe' %}" required style="height: 52px;">
                </div>

                <div class="form-group">
                    <label class="form-label">{% trans "Email Address" %}</label>
                    <input type="email" name="email" class="form-control form-control-lg" placeholder="{% trans 'name@example.com' %}" required style="height: 52px;">
                </div>

                <div class="form-group">
                    <label class="form-label">{% trans "Your Message" %}</label>
                    <textarea name="message" class="form-control" placeholder="{% trans 'How can we help you today?' %}" required style="min-height: 150px; padding-top: 16px;"></textarea>
                </div>

                <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; height: 56px; font-size: 1.1rem; margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 12px;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
                    {% trans "Send Message" %}
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
